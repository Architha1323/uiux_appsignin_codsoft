<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Premium App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="illustration">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- Soft gradient background circle -->
                    <defs>
                        <linearGradient id="softGreen" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#86efac;stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.15" />
                        </linearGradient>
                    </defs>
                    
                    <!-- Background -->
                    <circle cx="100" cy="100" r="95" fill="url(#softGreen)" opacity="0.6"/>
                    
                    <!-- Smartphone illustration -->
                    <rect x="65" y="40" width="70" height="120" rx="8" fill="none" stroke="#4ade80" stroke-width="2.5"/>
                    <rect x="70" y="50" width="60" height="95" rx="4" fill="#f0f9ff"/>
                    
                    <!-- Screen content -->
                    <circle cx="100" cy="65" r="6" fill="#4ade80" opacity="0.6"/>
                    <rect x="75" y="80" width="50" height="3" rx="1.5" fill="#86efac" opacity="0.5"/>
                    <rect x="75" y="90" width="50" height="3" rx="1.5" fill="#86efac" opacity="0.4"/>
                    <rect x="75" y="100" width="35" height="3" rx="1.5" fill="#86efac" opacity="0.3"/>
                    
                    <!-- Decorative elements -->
                    <circle cx="140" cy="30" r="8" fill="#4ade80" opacity="0.3"/>
                    <circle cx="30" cy="140" r="10" fill="#6ee7b7" opacity="0.25"/>
                    <path d="M 50 50 Q 55 45 60 50" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.3"/>
                </svg>
            </div>

            <div class="home-content">
                <h1 class="title">Welcome</h1>
                <p class="subtitle" id="userGreeting">Experience a premium, modern application</p>
                
                <div id="successMessage" class="success-message"></div>

                <div class="button-group" style="margin-top: 40px;">
                    <button class="btn btn-primary" onclick="navigateTo('signup.html')">
                        Sign Up
                    </button>
                    <button class="btn btn-secondary" onclick="navigateTo('signin.html')">
                        Sign In
                    </button>
                </div>

                <div class="form-footer" style="margin-top: 40px;">
                    <p id="logoutContainer" style="display: none;">
                        <a href="#" onclick="logout(); return false;">Logout</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Show logout button if user is logged in
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = getCurrentUser();
            const logoutContainer = document.getElementById('logoutContainer');
            const buttonGroup = document.querySelector('.button-group');
            
            if (currentUser) {
                logoutContainer.style.display = 'block';
                buttonGroup.style.display = 'none';
            }
        });
    </script>
</body>
</html>
