<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GlassAuth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container signin-container">
        <div class="glass-card auth-card">
            <div class="card-header">
                <a href="index.html" class="back-link">← Back</a>
                <h2>Sign In</h2>
            </div>

            <form id="signinForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="signinEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="signinEmail" 
                        name="email" 
                        placeholder="you@example.com"
                        required>
                    <span class="form-error" id="signinEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="signinPassword">Password</label>
                    <input 
                        type="password" 
                        id="signinPassword" 
                        name="password" 
                        placeholder="••••••••"
                        required>
                    <span class="form-error" id="signinPasswordError"></span>
                </div>

                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="rememberMe" 
                        name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>

                <div class="form-divider">
                    <span>or continue with</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="social-btn google-btn" title="Sign in with Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button type="button" class="social-btn facebook-btn" title="Sign in with Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                    <button type="button" class="social-btn twitter-btn" title="Sign in with Twitter">
                        <i class="fab fa-twitter"></i>
                    </button>
                </div>

                <p class="auth-link">Don't have an account? <a href="signup.html">Create one</a></p>
                <p class="auth-link forgot-password"><a href="#">Forgot password?</a></p>
            </form>

            <div class="success-message" id="signinSuccessMessage" style="display: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke-width="2" stroke-linecap="round"/>
                    <polyline points="22 4 12 14.01 9 11.01" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <p>Signed in successfully! Redirecting...</p>
            </div>

            <div class="user-info" id="userInfo" style="display: none;">
                <div class="info-header">
                    <h3>Welcome back!</h3>
                    <button type="button" class="btn-logout" id="logoutBtn">Logout</button>
                </div>
                <div class="user-details">
                    <p><strong>Name:</strong> <span id="displayName"></span></p>
                    <p><strong>Email:</strong> <span id="displayEmail"></span></p>
                    <p><strong>Joined:</strong> <span id="displayDate"></span></p>
                </div>
            </div>
        </div>

        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
