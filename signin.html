<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Premium App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="illustration">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- Soft gradient background -->
                    <defs>
                        <linearGradient id="signinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#86efac;stop-opacity:0.25" />
                            <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.15" />
                        </linearGradient>
                    </defs>
                    
                    <circle cx="100" cy="100" r="95" fill="url(#signinGradient)" opacity="0.6"/>
                    
                    <!-- Lock illustration -->
                    <rect x="60" y="70" width="80" height="50" rx="6" fill="none" stroke="#4ade80" stroke-width="2.5"/>
                    <path d="M 75 70 V 55 Q 75 45 100 45 Q 125 45 125 55 V 70" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
                    
                    <!-- Keyhole -->
                    <circle cx="100" cy="92" r="5" fill="#4ade80" opacity="0.3"/>
                    <rect x="98" y="99" width="4" height="10" fill="#4ade80" opacity="0.2"/>
                    
                    <!-- Shine effect -->
                    <rect x="65" y="75" width="50" height="8" fill="#86efac" opacity="0.3" rx="3"/>
                    
                    <!-- Decorative elements -->
                    <circle cx="45" cy="50" r="7" fill="#6ee7b7" opacity="0.25"/>
                    <circle cx="170" cy="130" r="9" fill="#4ade80" opacity="0.2"/>
                </svg>
            </div>

            <h1 class="title">Sign In</h1>
            <p class="subtitle">Welcome back, we missed you</p>

            <div id="successMessage" class="success-message"></div>

            <form onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label for="signinEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="signinEmail" 
                        placeholder="you@example.com"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="signinPassword">Password</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="signinPassword" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('signinPassword')">👁️</button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 28px;">
                    Sign In
                </button>
            </form>

            <!-- Social Login Section -->
            <div class="social-login">
                <div class="social-divider">or signin via</div>
                <div class="social-buttons">
                    <button type="button" class="social-btn" title="Sign in with Google">G</button>
                    <button type="button" class="social-btn" title="Sign in with Facebook">f</button>
                    <button type="button" class="social-btn" title="Sign in with Twitter">𝕏</button>
                </div>
            </div>

            <div class="form-footer">
                <p>Don't have an account? <a href="signup.html">Create one here</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
