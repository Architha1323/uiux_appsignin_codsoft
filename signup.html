<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - GlassAuth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container signup-container">
        <div class="glass-card auth-card">
            <div class="card-header">
                <a href="index.html" class="back-link">← Back</a>
                <h2>Create Account</h2>
            </div>

            <form id="signupForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="John Doe"
                        required>
                    <span class="form-error" id="fullNameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="you@example.com"
                        required>
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required>
                    <span class="form-error" id="passwordError"></span>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <small class="password-hint" id="strengthText"></small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="••••••••"
                        required>
                    <span class="form-error" id="confirmPasswordError"></span>
                </div>

                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms" 
                        required>
                    <label for="terms">I agree to the Terms & Conditions</label>
                    <span class="form-error" id="termsError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>

                <div class="form-divider">
                    <span>or continue with</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="social-btn google-btn" title="Sign up with Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button type="button" class="social-btn facebook-btn" title="Sign up with Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                    <button type="button" class="social-btn twitter-btn" title="Sign up with Twitter">
                        <i class="fab fa-twitter"></i>
                    </button>
                </div>

                <p class="auth-link">Already have an account? <a href="signin.html">Sign In</a></p>
            </form>

            <div class="success-message" id="successMessage" style="display: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke-width="2" stroke-linecap="round"/>
                    <polyline points="22 4 12 14.01 9 11.01" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <p>Account created successfully! Redirecting...</p>
            </div>
        </div>

        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
